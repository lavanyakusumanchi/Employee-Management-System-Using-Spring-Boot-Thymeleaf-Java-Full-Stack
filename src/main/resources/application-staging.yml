# Staging environment configuration
# Activate with: --spring.profiles.active=staging

spring:
  config:
    activate:
      on-profile: staging
      
  datasource:
    # Supabase PostgreSQL connection pooler (port 6543 for better performance)
    url: jdbc:postgresql://db.xmcvmihhwjqfguouvywt.supabase.co:6543/postgres?sslmode=require
    username: postgres
    password: ${SUPABASE_PASSWORD:Lavanya@1012}
    driver-class-name: org.postgresql.Driver
    
    # HikariCP tuning for Supabase staging environment
    # Critical: Supabase kills idle connections after ~5 minutes
    hikari:
      maximum-pool-size: 20            # Higher than local for staging traffic
      minimum-idle: 2                   # Keep 2 connections warm
      max-lifetime: 280000              # 4.67 min (less than Supabase 5min timeout)
      keepalive-time: 120000            # 2 min (ping to keep connections alive)
      idle-timeout: 60000               # 1 min (remove idle connections)
      connection-timeout: 10000         # 10 sec (fail fast if can't connect)
      
  jpa:
    hibernate:
      ddl-auto: update                  # Update schema, don't drop tables
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false                     # Disable in staging (too verbose)
    open-in-view: false
    
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      connect-timeout: 2000ms
      timeout: 2000ms
      
# CORS for staging frontend
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:https://staging-frontend.example.com,http://localhost:3000}
    
# Pagination
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

# Logging for staging
logging:
  level:
    edu.qs.attendance: INFO
    org.hibernate.SQL: INFO
    org.springframework.cache: WARN
