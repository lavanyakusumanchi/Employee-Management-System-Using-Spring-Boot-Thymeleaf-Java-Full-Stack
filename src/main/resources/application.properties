spring.application.name=Employee_Management_System

# H2 In-Memory Database (works locally, data lost on restart)
spring.datasource.url=jdbc:h2:mem:attendancedb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# H2 Console Access
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080

# Pagination
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

